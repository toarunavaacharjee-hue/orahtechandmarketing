<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0e1220"/><stop offset="100%" stop-color="#080c18"/></linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1408"/><stop offset="100%" stop-color="#0e0c06"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD600"/><stop offset="100%" stop-color="#ff9d00"/></linearGradient>
    <linearGradient id="goldfade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD600" stop-opacity="0.18"/><stop offset="100%" stop-color="#FFD600" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- Ambient gold glow -->
  <ellipse cx="300" cy="160" rx="260" ry="130" fill="url(#goldfade)"/>
  <!-- Left brochure page -->
  <rect x="20" y="24" width="272" height="292" rx="14" fill="url(#hero)" stroke="rgba(255,214,0,0.25)" stroke-width="1.5"/>
  <!-- Building image area -->
  <rect x="32" y="36" width="248" height="160" rx="10" fill="rgba(255,214,0,0.05)" stroke="rgba(255,214,0,0.15)" stroke-width="1"/>
  <!-- Skyline silhouette -->
  <rect x="60" y="100" width="48" height="96" rx="5" fill="rgba(255,214,0,0.12)"/>
  <rect x="114" y="80" width="36" height="116" rx="5" fill="rgba(255,214,0,0.16)"/>
  <rect x="156" y="110" width="28" height="86" rx="4" fill="rgba(255,214,0,0.1)"/>
  <rect x="190" y="90" width="52" height="106" rx="5" fill="rgba(255,214,0,0.14)"/>
  <rect x="248" y="120" width="24" height="76" rx="4" fill="rgba(255,214,0,0.08)"/>
  <!-- Windows on buildings -->
  <rect x="68" y="112" width="10" height="8" rx="1" fill="rgba(255,214,0,0.4)"/>
  <rect x="82" y="112" width="10" height="8" rx="1" fill="rgba(255,214,0,0.3)"/>
  <rect x="68" y="128" width="10" height="8" rx="1" fill="rgba(255,214,0,0.25)"/>
  <rect x="82" y="128" width="10" height="8" rx="1" fill="rgba(255,214,0,0.4)"/>
  <rect x="120" y="92" width="10" height="8" rx="1" fill="rgba(255,214,0,0.4)"/>
  <rect x="134" y="92" width="10" height="8" rx="1" fill="rgba(255,214,0,0.3)"/>
  <rect x="120" y="108" width="10" height="8" rx="1" fill="rgba(255,214,0,0.35)"/>
  <!-- Gradient overlay on building image -->
  <rect x="32" y="140" width="248" height="56" rx="0" fill="url(#hero)" opacity="0.6"/>
  <rect x="32" y="185" width="248" height="11" rx="0" fill="url(#hero)" opacity="0.9"/>
  <!-- Left page text -->
  <rect x="44" y="208" width="140" height="14" rx="4" fill="white" opacity="0.85"/>
  <rect x="44" y="228" width="220" height="7" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="44" y="240" width="200" height="7" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="44" y="252" width="180" height="7" rx="2" fill="rgba(255,255,255,0.22)"/>
  <!-- Gold line accent -->
  <rect x="44" y="272" width="60" height="3" rx="2" fill="url(#gold)"/>
  <rect x="44" y="284" width="100" height="7" rx="2" fill="rgba(255,214,0,0.5)"/>
  <!-- Right page -->
  <rect x="308" y="24" width="272" height="292" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,214,0,0.15)" stroke-width="1"/>
  <!-- Right top content -->
  <rect x="322" y="40" width="140" height="14" rx="4" fill="white" opacity="0.8"/>
  <rect x="322" y="60" width="240" height="7" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="322" y="72" width="220" height="7" rx="2" fill="rgba(255,255,255,0.22)"/>
  <rect x="322" y="84" width="230" height="7" rx="2" fill="rgba(255,255,255,0.18)"/>
  <!-- Stat boxes -->
  <rect x="322" y="106" width="76" height="68" rx="10" fill="rgba(255,214,0,0.1)" stroke="rgba(255,214,0,0.28)" stroke-width="1"/>
  <rect x="330" y="118" width="36" height="22" rx="4" fill="rgba(255,214,0,0.2)"/>
  <rect x="332" y="122" width="32" height="14" rx="3" fill="url(#gold)" opacity="0.7"/>
  <rect x="338" y="126" width="20" height="8" rx="2" fill="#FFD600"/>
  <rect x="330" y="146" width="56" height="7" rx="2" fill="rgba(255,255,255,0.45)"/>
  <rect x="330" y="157" width="44" height="7" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="408" y="106" width="76" height="68" rx="10" fill="rgba(255,92,26,0.1)" stroke="rgba(255,92,26,0.25)" stroke-width="1"/>
  <rect x="420" y="118" width="38" height="14" rx="3" fill="#FF5C1A" opacity="0.7"/>
  <rect x="420" y="146" width="52" height="7" rx="2" fill="rgba(255,255,255,0.45)"/>
  <rect x="420" y="157" width="40" height="7" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="494" y="106" width="76" height="68" rx="10" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.22)" stroke-width="1"/>
  <rect x="504" y="118" width="44" height="14" rx="3" fill="#00D4FF" opacity="0.6"/>
  <rect x="504" y="146" width="52" height="7" rx="2" fill="rgba(255,255,255,0.45)"/>
  <rect x="504" y="157" width="44" height="7" rx="2" fill="rgba(255,255,255,0.28)"/>
  <!-- Floor plan -->
  <rect x="322" y="186" width="248" height="90" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,214,0,0.12)" stroke-width="1"/>
  <rect x="334" y="198" width="80" height="9" rx="3" fill="rgba(255,255,255,0.5)"/>
  <g stroke="rgba(255,214,0,0.25)" stroke-width="1" fill="rgba(255,214,0,0.04)">
    <rect x="334" y="214" width="56" height="50" rx="0"/>
    <rect x="390" y="214" width="40" height="24" rx="0"/>
    <rect x="390" y="238" width="40" height="26" rx="0"/>
    <rect x="430" y="214" width="60" height="50" rx="0"/>
    <rect x="490" y="220" width="46" height="36" rx="0"/>
  </g>
  <!-- CTA button -->
  <rect x="322" y="288" width="120" height="24" rx="12" fill="url(#gold)" opacity="0.9"/>
  <rect x="338" y="296" width="88" height="8" rx="3" fill="rgba(0,0,0,0.6)"/>
  <!-- Gold badge -->
  <rect x="20" y="298" width="148" height="18" rx="9" fill="rgba(255,214,0,0.15)" stroke="rgba(255,214,0,0.35)" stroke-width="1"/>
  <rect x="32" y="306" width="124" height="6" rx="2" fill="#FFD600" opacity="0.65"/>
</svg>
