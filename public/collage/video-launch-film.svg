<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0e06"/><stop offset="100%" stop-color="#050a18"/></linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2a1408"/><stop offset="100%" stop-color="#0d0905"/></linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF5C1A" stop-opacity="0.35"/><stop offset="100%" stop-color="#FF5C1A" stop-opacity="0"/></linearGradient>
    <linearGradient id="scrubberfill" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FF5C1A"/><stop offset="65%" stop-color="#FF5C1A"/><stop offset="65%" stop-color="rgba(255,255,255,0.15)"/><stop offset="100%" stop-color="rgba(255,255,255,0.15)"/></linearGradient>
    <radialGradient id="playglow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FF5C1A" stop-opacity="0.4"/><stop offset="100%" stop-color="#FF5C1A" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="240" height="300" fill="url(#bg)"/>

  <!-- Film strip top -->
  <rect x="0" y="0" width="240" height="28" fill="#0d0905"/>
  <rect x="8" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="34" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="60" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="86" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="112" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="138" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="164" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="190" y="5" width="18" height="18" rx="3" fill="#1e1208"/>
  <rect x="216" y="5" width="18" height="18" rx="3" fill="#1e1208"/>

  <!-- Main video frame -->
  <rect x="12" y="36" width="216" height="162" rx="8" fill="url(#frame)"/>
  <!-- Cinematic letterbox bars -->
  <rect x="12" y="36" width="216" height="24" rx="4" fill="rgba(0,0,0,0.7)"/>
  <rect x="12" y="174" width="216" height="24" rx="4" fill="rgba(0,0,0,0.7)"/>
  <!-- Scene content - city skyline silhouette -->
  <rect x="30" y="100" width="28" height="74" rx="3" fill="rgba(255,92,26,0.18)"/>
  <rect x="64" y="82" width="22" height="92" rx="3" fill="rgba(255,92,26,0.22)"/>
  <rect x="92" y="112" width="18" height="62" rx="2" fill="rgba(255,92,26,0.14)"/>
  <rect x="116" y="90" width="32" height="84" rx="3" fill="rgba(255,92,26,0.2)"/>
  <rect x="154" y="104" width="20" height="70" rx="2" fill="rgba(255,92,26,0.16)"/>
  <rect x="180" y="78" width="26" height="96" rx="3" fill="rgba(255,92,26,0.22)"/>
  <rect x="212" y="116" width="12" height="58" rx="2" fill="rgba(255,92,26,0.12)"/>
  <!-- Ground plane -->
  <rect x="12" y="168" width="216" height="6" fill="rgba(255,92,26,0.1)"/>
  <!-- Orange sky glow -->
  <ellipse cx="120" cy="80" rx="80" ry="40" fill="url(#glow)"/>

  <!-- Play button -->
  <circle cx="120" cy="117" r="28" fill="url(#playglow)"/>
  <circle cx="120" cy="117" r="20" fill="rgba(255,92,26,0.25)" stroke="#FF5C1A" stroke-width="1.5"/>
  <polygon points="114,108 114,126 132,117" fill="#FF5C1A"/>

  <!-- Title card overlay -->
  <rect x="12" y="210" width="216" height="56" rx="6" fill="rgba(10,6,2,0.9)"/>
  <rect x="24" y="220" width="3" height="26" rx="2" fill="#FF5C1A"/>
  <rect x="34" y="220" width="130" height="11" rx="3" fill="white" opacity="0.9"/>
  <rect x="34" y="236" width="90" height="7" rx="2" fill="rgba(255,92,26,0.7)"/>
  <rect x="34" y="248" width="110" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>
  <!-- Duration badge -->
  <rect x="176" y="220" width="42" height="16" rx="8" fill="rgba(255,92,26,0.2)" stroke="rgba(255,92,26,0.4)" stroke-width="1"/>
  <rect x="182" y="225" width="30" height="6" rx="2" fill="#FF5C1A" opacity="0.8"/>

  <!-- Scrubber / timeline -->
  <rect x="12" y="275" width="216" height="4" rx="2" fill="url(#scrubberfill)"/>
  <circle cx="156" cy="277" r="5" fill="#FF5C1A"/>

  <!-- Controls row -->
  <circle cx="24" cy="290" r="5" fill="rgba(255,92,26,0.3)" stroke="rgba(255,92,26,0.5)" stroke-width="1"/>
  <rect x="36" y="287" width="40" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="170" y="287" width="28" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="216" cy="290" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Film strip bottom -->
  <rect x="0" y="272" width="240" height="0" fill="#0d0905"/>
</svg>
