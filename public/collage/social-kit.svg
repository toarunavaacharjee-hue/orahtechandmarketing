<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#040e18"/><stop offset="100%" stop-color="#020810"/></linearGradient>
    <linearGradient id="post1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#062030"/><stop offset="100%" stop-color="#040c18"/></linearGradient>
    <linearGradient id="story" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#051828"/><stop offset="100%" stop-color="#030c18"/></linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#0090ff"/></linearGradient>
  </defs>
  <rect width="240" height="300" fill="url(#bg)"/>

  <!-- App header -->
  <rect x="0" y="0" width="240" height="44" fill="rgba(4,14,24,0.98)"/>
  <circle cx="20" cy="22" r="8" fill="rgba(0,212,255,0.2)" stroke="#00D4FF" stroke-width="1.5"/>
  <circle cx="20" cy="22" r="3" fill="#00D4FF"/>
  <rect x="34" y="16" width="70" height="12" rx="3" fill="white" opacity="0.85"/>
  <circle cx="206" cy="22" r="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="222" cy="22" r="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Stories row -->
  <rect x="0" y="44" width="240" height="76" fill="rgba(255,255,255,0.02)"/>
  <!-- Story 1 - active -->
  <circle cx="36" cy="82" r="22" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <circle cx="36" cy="82" r="18" fill="rgba(0,212,255,0.15)"/>
  <circle cx="36" cy="82" r="18" fill="rgba(0,212,255,0.08)"/>
  <rect x="30" y="76" width="12" height="12" rx="3" fill="rgba(0,212,255,0.4)"/>
  <rect x="26" y="96" width="20" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Story 2 -->
  <circle cx="88" cy="82" r="22" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <circle cx="88" cy="82" r="18" fill="rgba(124,108,255,0.12)"/>
  <rect x="82" y="76" width="12" height="12" rx="3" fill="rgba(124,108,255,0.4)"/>
  <rect x="78" y="96" width="20" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Story 3 -->
  <circle cx="140" cy="82" r="22" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <circle cx="140" cy="82" r="18" fill="rgba(255,92,26,0.1)"/>
  <rect x="134" y="76" width="12" height="12" rx="3" fill="rgba(255,92,26,0.4)"/>
  <rect x="130" y="96" width="20" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Story 4 -->
  <circle cx="192" cy="82" r="22" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <circle cx="192" cy="82" r="18" fill="rgba(184,255,108,0.08)"/>
  <rect x="186" y="76" width="12" height="12" rx="3" fill="rgba(184,255,108,0.35)"/>
  <rect x="182" y="96" width="20" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Divider -->
  <rect x="0" y="120" width="240" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Main post -->
  <rect x="0" y="121" width="240" height="130" fill="url(#post1)"/>
  <!-- Post visual: abstract brand layout -->
  <rect x="0" y="121" width="240" height="130" fill="rgba(0,212,255,0.05)"/>
  <!-- Brand grid inside post -->
  <rect x="16" y="133" width="100" height="68" rx="6" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
  <circle cx="66" cy="167" r="22" fill="rgba(0,212,255,0.18)" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <circle cx="66" cy="167" r="12" fill="rgba(0,212,255,0.3)"/>
  <circle cx="66" cy="167" r="5" fill="#00D4FF"/>
  <rect x="124" y="133" width="100" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="134" y="143" width="70" height="8" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="124" y="171" width="100" height="30" rx="6" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <rect x="134" y="181" width="50" height="8" rx="2" fill="#00D4FF" opacity="0.7"/>
  <!-- Post caption area -->
  <rect x="16" y="210" width="180" height="7" rx="2" fill="rgba(255,255,255,0.55)"/>
  <rect x="16" y="222" width="140" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="16" y="234" width="160" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>

  <!-- Engagement row -->
  <rect x="0" y="251" width="240" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="16" y="258" width="26" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="50" y="258" width="26" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="84" y="258" width="26" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Like count -->
  <rect x="180" y="256" width="44" height="12" rx="6" fill="rgba(0,212,255,0.15)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <rect x="186" y="260" width="32" height="5" rx="2" fill="#00D4FF" opacity="0.7"/>

  <!-- Post 2 preview (bottom) -->
  <rect x="0" y="276" width="240" height="24" fill="rgba(255,255,255,0.015)"/>
  <rect x="16" y="282" width="80" height="14" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="104" y="282" width="80" height="14" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="192" y="282" width="32" height="14" rx="4" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
</svg>
