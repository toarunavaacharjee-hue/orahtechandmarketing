<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0818"/><stop offset="100%" stop-color="#060410"/></linearGradient>
    <linearGradient id="slide" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#120e24"/><stop offset="100%" stop-color="#0a0818"/></linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#7c6cff"/><stop offset="100%" stop-color="#a78bff"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#FF5C1A"/><stop offset="100%" stop-color="#ff8c42"/></linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#40e8ff"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7c6cff"/><stop offset="100%" stop-color="#FF5C1A"/></linearGradient>
  </defs>
  <rect width="240" height="300" fill="url(#bg)"/>

  <!-- Slide stack shadow (back) -->
  <rect x="20" y="14" width="206" height="138" rx="8" fill="rgba(124,108,255,0.06)" stroke="rgba(124,108,255,0.12)" stroke-width="1"/>
  <rect x="14" y="20" width="206" height="138" rx="8" fill="rgba(124,108,255,0.08)" stroke="rgba(124,108,255,0.15)" stroke-width="1"/>

  <!-- Main slide -->
  <rect x="8" y="26" width="218" height="142" rx="8" fill="url(#slide)" stroke="rgba(124,108,255,0.35)" stroke-width="1.5"/>
  <!-- Slide header accent bar -->
  <rect x="8" y="26" width="218" height="4" rx="4" fill="url(#accent)" opacity="0.7"/>

  <!-- Slide content - company logo mark area -->
  <rect x="20" y="40" width="26" height="26" rx="6" fill="rgba(124,108,255,0.2)" stroke="rgba(124,108,255,0.4)" stroke-width="1"/>
  <circle cx="33" cy="53" r="7" fill="none" stroke="#7c6cff" stroke-width="1.5"/>
  <circle cx="33" cy="53" r="3" fill="#7c6cff"/>
  <rect x="52" y="44" width="90" height="10" rx="3" fill="white" opacity="0.85"/>
  <rect x="52" y="58" width="60" height="6" rx="2" fill="rgba(124,108,255,0.6)"/>

  <!-- Divider -->
  <rect x="20" y="75" width="196" height="1" fill="rgba(124,108,255,0.2)"/>

  <!-- Chart section -->
  <rect x="20" y="84" width="120" height="70" rx="6" fill="rgba(255,255,255,0.02)"/>
  <!-- Chart grid -->
  <line x1="20" y1="140" x2="140" y2="140" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="20" y1="128" x2="140" y2="128" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="20" y1="116" x2="140" y2="116" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="20" y1="104" x2="140" y2="104" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Bars -->
  <rect x="30" y="120" width="18" height="20" rx="3" fill="url(#bar1)" opacity="0.8"/>
  <rect x="54" y="110" width="18" height="30" rx="3" fill="url(#bar1)"/>
  <rect x="78" y="100" width="18" height="40" rx="3" fill="url(#bar2)"/>
  <rect x="102" y="90" width="18" height="50" rx="3" fill="url(#bar3)"/>
  <!-- Trend line -->
  <polyline points="39,130 63,120 87,110 111,105" stroke="#b8ff6c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="111" cy="105" r="3" fill="#b8ff6c"/>

  <!-- Stats sidebar in slide -->
  <rect x="148" y="84" width="66" height="28" rx="6" fill="rgba(124,108,255,0.12)" stroke="rgba(124,108,255,0.25)" stroke-width="1"/>
  <rect x="156" y="91" width="30" height="10" rx="2" fill="#7c6cff" opacity="0.8"/>
  <rect x="156" y="104" width="48" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="148" y="118" width="66" height="28" rx="6" fill="rgba(255,92,26,0.1)" stroke="rgba(255,92,26,0.22)" stroke-width="1"/>
  <rect x="156" y="125" width="28" height="10" rx="2" fill="#FF5C1A" opacity="0.7"/>
  <rect x="156" y="138" width="44" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>

  <!-- Slide footer -->
  <rect x="20" y="157" width="80" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="180" y="157" width="36" height="6" rx="2" fill="rgba(124,108,255,0.4)"/>

  <!-- Slide nav dots -->
  <circle cx="108" cy="176" r="3" fill="#7c6cff"/>
  <circle cx="118" cy="176" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="128" cy="176" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="138" cy="176" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="148" cy="176" r="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Thumbnail strip below -->
  <rect x="8" y="190" width="52" height="38" rx="6" fill="rgba(124,108,255,0.18)" stroke="rgba(124,108,255,0.4)" stroke-width="1.5"/>
  <rect x="13" y="195" width="42" height="12" rx="2" fill="rgba(124,108,255,0.3)"/>
  <rect x="13" y="211" width="30" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="66" y="190" width="52" height="38" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="71" y="195" width="42" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="71" y="211" width="30" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="124" y="190" width="52" height="38" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="129" y="195" width="42" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="129" y="211" width="30" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="182" y="190" width="52" height="38" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="187" y="195" width="42" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="187" y="211" width="30" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Speaker notes area -->
  <rect x="8" y="238" width="224" height="54" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="18" y="248" width="70" height="7" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="18" y="260" width="200" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="18" y="270" width="170" height="5" rx="2" fill="rgba(255,255,255,0.13)"/>
  <rect x="18" y="280" width="140" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
</svg>
