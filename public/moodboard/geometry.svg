<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0f2c"/><stop offset="100%" stop-color="#050a18"/></linearGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c6cff" stop-opacity="0.9"/><stop offset="100%" stop-color="#7c6cff" stop-opacity="0"/></linearGradient>
    <linearGradient id="arc2" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF5C1A" stop-opacity="0.8"/><stop offset="100%" stop-color="#FF5C1A" stop-opacity="0"/></linearGradient>
    <linearGradient id="arc3" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#00D4FF" stop-opacity="0.7"/><stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Golden ratio construction circles -->
  <circle cx="200" cy="178" r="112" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="200" cy="178" r="69" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="200" cy="178" r="43" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="200" cy="178" r="26" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <!-- Construction lines -->
  <line x1="88" y1="178" x2="312" y2="178" stroke="rgba(255,255,255,0.05)" stroke-width="0.8"/>
  <line x1="200" y1="66" x2="200" y2="290" stroke="rgba(255,255,255,0.05)" stroke-width="0.8"/>
  <line x1="121" y1="99" x2="279" y2="257" stroke="rgba(255,255,255,0.03)" stroke-width="0.8"/>
  <line x1="279" y1="99" x2="121" y2="257" stroke="rgba(255,255,255,0.03)" stroke-width="0.8"/>
  <!-- Colored arcs -->
  <path d="M 200 66 A 112 112 0 0 1 312 178" stroke="url(#arc1)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 312 178 A 112 112 0 0 1 200 290" stroke="url(#arc2)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 200 290 A 112 112 0 0 1 88 178" stroke="url(#arc3)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 88 178 A 112 112 0 0 1 200 66" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4,4"/>
  <!-- Center mark -->
  <circle cx="200" cy="178" r="8" fill="#7c6cff" opacity="0.9"/>
  <circle cx="200" cy="178" r="4" fill="white" opacity="0.9"/>
  <!-- Measurement ticks -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1">
    <line x1="88" y1="173" x2="88" y2="183"/>
    <line x1="131" y1="173" x2="131" y2="183"/>
    <line x1="174" y1="173" x2="174" y2="183"/>
    <line x1="226" y1="173" x2="226" y2="183"/>
    <line x1="269" y1="173" x2="269" y2="183"/>
    <line x1="312" y1="173" x2="312" y2="183"/>
  </g>
  <!-- Logo mark box (top-left) -->
  <rect x="38" y="34" width="82" height="82" rx="16" fill="rgba(124,108,255,0.1)" stroke="rgba(124,108,255,0.28)" stroke-width="1.5"/>
  <!-- O letterform -->
  <circle cx="79" cy="75" r="25" stroke="#7c6cff" stroke-width="3" opacity="0.85"/>
  <circle cx="79" cy="75" r="14" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="79" cy="75" r="4" fill="#FF5C1A"/>
  <line x1="38" y1="126" x2="120" y2="126" stroke="rgba(124,108,255,0.4)" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="49" y="135" font-family="monospace" font-size="7" fill="rgba(124,108,255,0.6)" letter-spacing="0.1em">LOGO MARK</text>
  <!-- Brand name badge -->
  <rect x="134" y="34" width="228" height="38" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="150" y="56" font-family="serif" font-size="15" fill="rgba(255,255,255,0.9)" font-weight="bold" letter-spacing="0.02em">Orah</text>
  <text x="192" y="56" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.08em">Tech &amp; Marketing</text>
  <!-- Tagline -->
  <rect x="134" y="80" width="228" height="22" rx="6" fill="rgba(255,255,255,0.025)"/>
  <text x="150" y="95" font-family="monospace" font-size="7.5" fill="rgba(0,212,255,0.6)" letter-spacing="0.12em">WHERE TECHNOLOGY MEETS GROWTH</text>
  <!-- Brand palette -->
  <rect x="38" y="308" width="324" height="72" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)"/>
  <text x="54" y="327" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)" letter-spacing="0.14em">BRAND PALETTE</text>
  <rect x="54" y="334" width="46" height="30" rx="6" fill="#FF5C1A"/>
  <text x="56" y="374" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.4)">#FF5C1A</text>
  <rect x="110" y="334" width="46" height="30" rx="6" fill="#00D4FF"/>
  <text x="112" y="374" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.4)">#00D4FF</text>
  <rect x="166" y="334" width="46" height="30" rx="6" fill="#7c6cff"/>
  <text x="168" y="374" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.4)">#7C6CFF</text>
  <rect x="222" y="334" width="46" height="30" rx="6" fill="#b8ff6c"/>
  <text x="224" y="374" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.4)">#B8FF6C</text>
  <rect x="278" y="334" width="46" height="30" rx="6" fill="#050A18" stroke="rgba(255,255,255,0.15)"/>
  <text x="280" y="374" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.4)">#050A18</text>
  <!-- Shape system -->
  <rect x="38" y="390" width="150" height="88" rx="12" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.15)"/>
  <text x="54" y="408" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.4)" letter-spacing="0.12em">SHAPE SYSTEM</text>
  <circle cx="70" cy="438" r="17" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="96" y="421" width="30" height="30" rx="4" stroke="#7c6cff" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="152,420 169,450 135,450" stroke="#FF5C1A" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Type scale -->
  <rect x="202" y="390" width="160" height="88" rx="12" fill="rgba(255,92,26,0.04)" stroke="rgba(255,92,26,0.15)"/>
  <text x="218" y="408" font-family="monospace" font-size="7" fill="rgba(255,92,26,0.5)" letter-spacing="0.12em">TYPE SCALE</text>
  <text x="218" y="428" font-family="serif" font-size="17" fill="rgba(255,255,255,0.75)" font-weight="bold">H1</text>
  <text x="252" y="428" font-family="serif" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="bold">H2</text>
  <text x="280" y="428" font-family="serif" font-size="9" fill="rgba(255,255,255,0.4)">H3</text>
  <rect x="218" y="434" width="122" height="5" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="218" y="444" width="100" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
  <rect x="218" y="453" width="112" height="4" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="218" y="462" width="80" height="4" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Label -->
  <rect x="38" y="488" width="132" height="20" rx="10" fill="rgba(124,108,255,0.15)" stroke="rgba(124,108,255,0.3)"/>
  <text x="52" y="502" font-family="monospace" font-size="8" fill="#7c6cff" letter-spacing="0.1em">BRAND GEOMETRY</text>
</svg>
